"redPen"     = PEN    (size=5 color="red");
"redArrow"   = LINE   (size=5 color="red"   arrowsize=2);
"redRect"    = RECT   (size=5 color="red");
"bluePen"    = PEN    (size=5 color="blue");
"blueArrow"  = LINE   (size=5 color="blue"  arrowsize=2);
"blueRect"   = RECT   (size=5 color="blue");
"greenPen"   = PEN    (size=5 color="green");
"greenArrow" = LINE   (size=5 color="green" arrowsize=2);
"greenRect"  = RECT   (size=5 color="green");
"rubber"     = ERASER (size=50);

"default"                   = "redPen";
"default"[Button2]          = "redRect";
"default"[Button3]          = "redArrow";
"default"[SHIFT]            = "bluePen";
"default"[SHIFT, Button2]   = "blueRect";
"default"[SHIFT, Button3]   = "blueArrow";
"default"[CONTROL]          = "greenPen";
"default"[CONTROL, Button2] = "greenRect";
"default"[CONTROL, Button3] = "greenArrow";
"default"[ALT]              = "rubber";

HOTKEY  = "d";
UNDOKEY = "u";
