[general]
  import = [
    "~/.config/alacritty/gruvbox_dark.toml"
  ]

[window]
  startup_mode = "Fullscreen"
  opacity = 0.7

[font]
  size = 9

[selection]
  save_to_clipboard = true

[mouse]
  hide_when_typing = true

[keyboard]
  bindings = [
    { key = "F1", chars = "s\n" },
    { key = "F2", chars = "sn\n" },
    { key = "F11", action = "ToggleFullscreen" }
  ]

